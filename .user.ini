[PHP]
max_input_vars = 10000
max_execution_time = 3000
display_errors = Off
max_input_time = 6000
memory_limit = 1280M
post_max_size = 640M
session.gc_maxlifetime = 1440
session.save_path = "/opt/alt/php80/var/lib/php/session"
upload_max_filesize = 6400M
zlib.output_compression = Off
